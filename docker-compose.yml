services:
  apk-analyzer:
    build:
      context: .
    image: apk-analyzer:latest
    environment:
      APKTOOL_PATH: /usr/local/bin/apktool
      JADX_PATH: /opt/jadx/bin/jadx
      JAVA_PATH: /usr/bin/java
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    command: ["--help"]
