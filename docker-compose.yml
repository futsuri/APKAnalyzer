# APK Analyzer — полный стек.
#
# Включает эмуляторный стек (android-emulator + proxy) из
# docker/android-emulator-1-main/docker-compose.yml и добавляет сервисы
# apk-analyzer-static и apk-analyzer-dynamic.
#
# Сервисы независимы: падение dynamic (или эмулятора) не роняет static.
#
# Запуск:
#   docker compose up                          # весь стек
#   docker compose up apk-analyzer-static      # только статика
#   docker compose run --rm apk-analyzer-dynamic \
#       --mode dynamic --package com.example app.apk
#
# compose v2.20+ (директива include).

include:
  - path: docker/android-emulator-1-main/docker-compose.yml

services:
  apk-analyzer-static:
    build:
      context: .
      dockerfile: Dockerfile.static
    container_name: apk-analyzer-static
    # Без depends_on — статика не зависит от эмулятора
    volumes:
      - ./data:/app/data
      # APK монтируется через /app/input (общий том с вебом)
      - ./uploads:/app/input:ro
    networks:
      - backend
    # По умолчанию запускаем статический анализ; APK передаётся аргументом.
    # При `docker compose up` без команды — idle, чтобы сервис не падал.
    command: ["--help"]

  apk-analyzer-dynamic:
    build:
      context: .
      dockerfile: Dockerfile.dynamic
    container_name: apk-analyzer-dynamic
    depends_on:
      - android-emulator
    environment:
      - EMULATOR_HOST=android-emulator
    volumes:
      - ./data:/app/data
      - ./uploads:/app/input:ro
    networks:
      - backend
    # Ограниченный restart — не бесконечный луп. 3 попытки.
    restart: "on-failure:3"
    # Динамический анализ запускается явно (нужны --mode/--package + APK).
    # При `docker compose up` без команды — idle.
    command: ["--help"]

  apk-analyzer-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: apk-analyzer-web
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      # Docker socket — чтобы веб управлял compose-стеком (up/run/ps).
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - EMULATOR_HOST=android-emulator
      - COMPOSE_PROJECT_NAME=apk-analyzer
    networks:
      - backend
    restart: unless-stopped

# Сеть `backend` объявлена в docker/android-emulator-1-main/docker-compose.yml
# (подключён через include). Сервисы анализатора просто подключаются к ней.
